<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>House Manual</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #161616;
        --muted: #2e2e2e;
        --button: #000000;
        --button-text: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
      }

      body {
        font-family: "Times New Roman", "Noto Serif JP", "Hiragino Mincho ProN",
          "Yu Mincho", serif;
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px 18px 34px;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .panel {
        width: min(100%, 560px);
        display: grid;
        justify-items: center;
        gap: 10px;
      }

      .brand {
        width: min(100%, 220px);
        max-width: 100%;
        display: block;
      }

      .facility {
        height: 58px;
        width: auto;
        max-width: 100%;
        display: block;
      }

      .facility + .subtitle {
        margin-top: 8px;
      }

      .subtitle {
        margin: 0;
        text-align: center;
        color: var(--muted);
        font-size: clamp(1rem, 1.8vw, 1.25rem);
        line-height: 1.2;
      }

      .subtitle + .subtitle {
        margin-top: -4px;
      }

      .links {
        width: min(100%, 352px);
        display: grid;
        gap: 22px;
        margin-top: 14px;
      }

      .link {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 53px;
        border-radius: 8px;
        background: var(--button);
        color: var(--button-text);
        text-decoration: none;
        font-size: 1.04rem;
        line-height: 1;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
      }

      .link:hover,
      .link:focus-visible {
        opacity: 0.92;
      }

      .link:focus-visible {
        outline: 2px solid #000;
        outline-offset: 3px;
      }

      @media (max-width: 420px) {
        .page {
          padding-inline: 14px;
        }

        .panel {
          gap: 10px;
        }

        .facility {
          height: 52px;
        }

        .links {
          width: min(100%, 300px);
          gap: 18px;
        }

        .link {
          min-height: 50px;
          font-size: 1rem;
        }
      }

      @media print {
        @page {
          margin: 0;
        }

        .page {
          padding: 14mm 12mm 16mm;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel" aria-labelledby="title">
        <h1 id="title" class="sr-only">House Manual</h1>
        <img class="brand" src="/manual/haneda/logo.png" alt="Seionan logo" />
        <img class="facility" src="/manual/haneda/facility.png" alt="Facility name" />

        <p class="subtitle">House Manual / ご宿泊のしおり</p>
        <p class="subtitle">房屋手册 / 하우스 매뉴얼</p>

        <nav class="links" aria-label="House manual downloads">
          <a class="link" href="/manual/haneda/en-ja.pdf">English / 日本語</a>
          <a class="link" href="/manual/haneda/en-zh.pdf">English / 中文</a>
          <a class="link" href="/manual/haneda/en-ko.pdf">English / 한국어</a>
        </nav>
      </section>
    </main>
  </body>
</html>
